# 1) Reconcile: PENDING policy.json on GitHub but pol_nft on-chain → ACTIVE + nft_asset_id; sync flight.json PNR row.
# 2) Cleanup: delete old true-drafts (no on-chain row) past MIN_AGE_MINUTES.
# Needs repo variable ZYURA_APP_ID. Dry-run: omit --execute on scripts locally.
name: Reconcile and cleanup policy metadata

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cleanup-pending-metadata
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Reconcile pending metadata from chain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          ZYURA_APP_ID: ${{ vars.ZYURA_APP_ID }}
          ALGOD_URL: ${{ vars.ALGOD_URL || 'https://testnet-api.algonode.cloud' }}
        run: node scripts/reconcile-pending-policies.mjs --execute

      - name: Remove stale draft metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          MIN_AGE_MINUTES: "1440"
          ZYURA_APP_ID: ${{ vars.ZYURA_APP_ID }}
          ALGOD_URL: ${{ vars.ALGOD_URL || 'https://testnet-api.algonode.cloud' }}
        run: node scripts/cleanup-pending-policies.mjs --execute
